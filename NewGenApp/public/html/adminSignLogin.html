<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel | NewGen</title>
  <link rel="stylesheet" href="../css/register.css" />
  <link rel="stylesheet" href="../css/colors.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>

  <header id="navbar"></header>

  <!-- Logo -->
  <div class="logo"></div>

  <!-- Signup Form -->
  <div class="reg-wrapper signup-form">
    <form id="admin-signup">
      <h2 class="register sign">Signup</h2>

      <label>Username</label>
      <input type="text" name="username" pattern="^[a-zA-Z0-9_]{3,16}$" required autocomplete="username" /><br>

      <label>Password</label>
      <input 
        type="password" name="password" 
        pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$" 
        required autocomplete="new-password"
      /><br>

      <div class="regMessage"></div>

      <button type="submit" class="btn">Register</button>
    </form>
  </div>

  <!-- Login Form -->
  <div class="reg-wrapper login-form hidden">
    <form id="admin-login">
      <h2 class="register sign">Login</h2>

      <label>Username</label>
      <input type="text" name="username" required autocomplete="username" /><br>

      <label>Password</label>
      <input type="password" name="password" required autocomplete="current-password"/><br>

      <label>Login Code</label>
      <input type="text" name="code" pattern="\d{6}" required title="6-digit login code" /><br>

      <div class="loginMessage"></div>

      <button type="submit" class="btn">Login</button>
    </form>
  </div>

  <!-- Footer -->
  <footer id="footer"></footer>

  <!-- JS Dependencies -->
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/footer.js"></script>
  <script src="../js/admin.js"></script>

</body>
</html>
