<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support | NewGen</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/colors.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>

  <header id="navbar"></header>

  <main id="app" class="support-page">

    <!-- Hero -->
    <section class="support-hero">
      <h1>Support & Help Center</h1>
      <p>Find answers to frequently asked questions or contact us directly.</p>
    </section>

    <!-- FAQ Section -->
    <section class="faq-section">
      <h2>Frequently Asked Questions</h2>
      <div id="faq-list">
        <!-- FAQ items injected here -->
      </div>
    </section>

    <!-- Contact Form -->
    <section class="contact-form-section">
      <h2>Contact Us</h2>
      <form id="contact-form">
        <input type="text" id="contact-name" placeholder="Your Name" required />
        <input type="email" id="contact-email" placeholder="Your Email" required />
        <textarea id="contact-message" rows="4" placeholder="Your Message" required></textarea>
        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>
    </section>

  </main>

  <footer id="footer"></footer>

    <script src="../js/auth.js"></script>
  <script  src="../js/navbar.js"></script>
  <script  src="../js/footer.js"></script>
  <script  src="../js/faqItem.js"></script>
  <script  src="../js/support.js"></script>
</body>
</html>
